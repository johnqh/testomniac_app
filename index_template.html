<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{VITE_APP_NAME}}</title>
    <meta name="description" content="{{VITE_APP_NAME}} by {{VITE_COMPANY_NAME}}" />
    <link rel="canonical" href="https://{{VITE_APP_DOMAIN}}/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{VITE_APP_NAME}}" />
    <meta property="og:title" content="{{VITE_APP_NAME}}" />
    <meta property="og:description" content="{{VITE_APP_NAME}} by {{VITE_COMPANY_NAME}}" />
    <meta property="og:url" content="https://{{VITE_APP_DOMAIN}}/" />
    <meta property="og:image" content="https://{{VITE_APP_DOMAIN}}/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{VITE_APP_NAME}}" />
    <meta name="twitter:description" content="{{VITE_APP_NAME}} by {{VITE_COMPANY_NAME}}" />
    <meta name="twitter:image" content="https://{{VITE_APP_DOMAIN}}/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
